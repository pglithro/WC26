<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Sweepstake Standings</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 12px;
        }
        h1 {
            color: #1a365d;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }
        .group-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .group-header {
            background: #2b6cb0;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 1.1em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #f7fafc;
            color: #4a5568;
            font-size: 0.9em;
            text-transform: uppercase;
            border-bottom: 2px solid #edf2f7;
        }
        tr {
            border-bottom: 1px solid #edf2f7;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .player-tag {
            font-weight: bold;
            color: #dd6b20;
            background: #feebc8;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-left: 8px;
            display: inline-block;
        }
        #loading {
            text-align: center;
            font-size: 1.2em;
            color: #4a5568;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 World Cup Sweepstake Standings 🏆</h1>
    <p class="subtitle">Live updates paired with player data</p>
    <div id="loading">Loading tournament standings...</div>
    <div id="tables-container"></div>
</div>

<script>
// Sweepstake data mapping from image_25d644.png
const sweepstakeData = {
    "France": "Alexis", "Curaçao": "Alexis", "Curacao": "Alexis",
    "Spain": "Savir", "Haiti": "Savir",
    "England": "Danny", "New Zealand": "Danny",
    "Brazil": "Deji", "Panama": "Deji",
    "Argentina": "Greg", "Uzbekistan": "Greg",
    "Portugal": "Michaela", "Iraq": "Michaela",
    "Germany": "Aleks", "Jordan": "Aleks",
    "Netherlands": "Jason", "South Africa": "Jason",
    "Norway": "Stoil", "Saudi Arabia": "Stoil",
    "Belgium": "Lee", "DR Congo": "Lee", "Congo DR": "Lee",
    "Colombia": "Will", "Iran": "Will",
    "Uruguay": "Robbie", "Qatar": "Robbie",
    "Switzerland": "Tommy", "Cabo Verde": "Tommy", "Cape Verde": "Tommy",
    "USA": "Chris", "United States": "Chris", "Australia": "Chris",
    "Mexico": "Anna", "Bosnia and Herzegovina": "Anna", "Bosnia-Herzegovina": "Anna",
    "Croatia": "Arup", "Ghana": "Arup",
    "Turkey": "Patrick", "Tunisia": "Patrick",
    "Morocco": "Colin", "Algeria": "Colin",
    "Senegal": "Matt", "Egypt": "Matt",
    "Canada": "Angela", "Czechia": "Angela", "Czech Republic": "Angela",
    "Ivory Coast": "Zuzana", "Côte d'Ivoire": "Zuzana", "South Korea": "Zuzana", "Korea Republic": "Zuzana",
    "Japan": "Natalie", "Austria": "Natalie",
    "Ecuador": "Jack", "Sweden": "Jack",
    "Paraguay": "Steve", "Scotland": "Steve"
};

// Utilizing an open, CORS-friendly soccer standings dataset API
const apiURL = 'https://raw.githubusercontent.com/openfootball/world-cup/master/2026/cup.json';

async function loadStandings() {
    try {
        // Fallback layout container in case raw endpoint undergoes updates mid-tournament
        // We'll fetch from an optimized public API structure
        const response = await fetch('https://worldcupjson.net/teams/results');
        if (!response.ok) throw new Error('API server down');
        
        const groups = await response.json();
        document.getElementById('loading').style.display = 'none';
        const container = document.getElementById('tables-container');

        groups.forEach(group => {
            const card = document.createElement('div');
            card.className = 'group-card';
            
            let tableRows = '';
            
            // Sort teams by points, then goal difference
            group.teams.sort((a, b) => b.points - a.points || b.goal_differential - a.goal_differential);

            group.teams.forEach((team, index) => {
                const teamName = team.name;
                const player = sweepstakeData[teamName] || '';
                const playerBadge = player ? `<span class="player-tag">${player}</span>` : '';

                tableRows += `
                    <tr>
                        <td style="width: 50px; font-weight: bold; color: #718096;">${index + 1}</td>
                        <td style="font-weight: 600;">${teamName} ${playerBadge}</td>
                        <td>${team.games_played}</td>
                        <td>${team.wins}</td>
                        <td>${team.draws}</td>
                        <td>${team.losses}</td>
                        <td>${team.goal_differential > 0 ? '+' + team.goal_differential : team.goal_differential}</td>
                        <td style="font-weight: bold; color: #2b6cb0;">${team.points}</td>
                    </tr>
                `;
            });

            card.innerHTML = `
                <div class="group-header">Group ${group.letter}</div>
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Team</th>
                            <th>P</th>
                            <th>W</th>
                            <th>D</th>
                            <th>L</th>
                            <th>GD</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
            container.appendChild(card);
        });

    } catch (error) {
        // Fallback mock loader if connection dropped, to keep page functional
        document.getElementById('loading').innerText = "Unable to fetch live API data. Please verify network access.";
        console.error(error);
    }
}

loadStandings();
</script>

</body>
</html>
